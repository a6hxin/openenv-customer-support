<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OpenEnv · Customer Support Resolution</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;--border2:#cbd5e1;--nc:#4f46e5;--np:#ef4444;--npu:#6366f1;--ng:#10b981;--ny:#f59e0b;--text:#0f172a;--muted:#64748b;--r:12px;--rs:8px;--shadow-sm:0 1px 2px 0 rgba(0,0,0,0.05);--shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;height:100dvh;overflow:hidden;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh;}
header{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm);z-index:10;flex-shrink:0;}
.logo{width:32px;height:32px;border-radius:8px;background:var(--nc);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.htitle{font-size:15px;font-weight:700;color:var(--text);}
.htag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--nc);border:1px solid rgba(79,70,229,0.2);padding:3px 8px;border-radius:20px;background:rgba(79,70,229,0.05);}
.hsub{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500;}
@media(max-width:600px){.hsub{display:none;}}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;}
@media(max-width:720px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);width:82vw;padding-top:56px;}.sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg);}}
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:99;backdrop-filter:blur(4px);}
.ov.open{display:block;}
.sb-scroll{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.slbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}
.tc{border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;overflow:hidden;box-shadow:var(--shadow-sm);}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity .2s;}
.tc.easy::before{background:var(--ng);}
.tc.medium::before{background:var(--ny);}
.tc.hard::before{background:var(--np);}
.tc:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow);}
.tc:hover::before,.tc.active::before{opacity:1;}
.tc.active{border-color:var(--nc);box-shadow:0 0 0 1px var(--nc);transform:translateY(-1px);}
.tc.active::before{background:var(--nc);}
.tn{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text);}
.td{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.tps{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.pill.easy{color:#065f46;background:#d1fae5;}
.pill.medium{color:#92400e;background:#fef3c7;}
.pill.hard{color:#991b1b;background:#fee2e2;}
.pill.m{color:var(--muted);background:var(--surface2);border:1px solid var(--border);}
.sp{margin:0 16px 16px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);display:none;box-shadow:var(--shadow-sm);}
.sp.show{display:block;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.snum{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1;}
.snum.pass{color:var(--ng);}
.snum.fail{color:var(--np);}
.ssub{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500;}
.sfb{font-size:12px;color:var(--text);line-height:1.5;margin:12px 0;padding:10px 14px;background:#eff6ff;border-radius:8px;border-left:3px solid var(--nc);font-weight:500;}
.bkr{display:flex;justify-content:space-between;font-size:11px;padding:6px 0;border-bottom:1px solid var(--border);}
.bkr:last-child{border-bottom:none;}
.bkk{color:var(--muted);font-weight:500;text-transform:capitalize;}
.bkv{font-weight:600;font-family:'JetBrains Mono',monospace;}
.bkv.pos{color:var(--ng);}
.bkv.neg{color:var(--np);}
.ctrl{padding:16px;border-top:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;gap:10px;}
.sr{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.sl2{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.05em;}
.si{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;width:80px;outline:none;transition:all .2s;}
.si:focus{border-color:var(--nc);box-shadow:0 0 0 3px rgba(79,70,229,0.15);}
.btn{width:100%;padding:10px 14px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-p{background:var(--nc);color:#fff;box-shadow:var(--shadow-sm);}
.btn-p:hover:not(:disabled){background:#4338ca;box-shadow:var(--shadow);transform:translateY(-1px);}
.btn-g{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow-sm);}
.btn-g:hover:not(:disabled){background:var(--surface2);border-color:var(--border2);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}
.ob{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:none;box-shadow:var(--shadow-sm);z-index:5;}
.ob.show{display:block;animation:fd .3s ease;}
@keyframes fd{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.ocs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.oc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;box-shadow:var(--shadow-sm);}
.ocl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.ocv{font-size:13px;font-weight:700;color:var(--text);}
.ost{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:500;}
.sv{color:var(--text);font-weight:600;}
.rv{color:var(--nc);font-weight:700;font-family:'JetBrains Mono',monospace;}
.rv.neg{color:var(--np);}
.pg{height:4px;background:var(--surface2);border-radius:4px;margin-top:14px;overflow:hidden;}
.pgf{height:100%;border-radius:4px;background:var(--nc);transition:width .4s;box-shadow:none;}
.cv{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);animation:br 3s ease-in-out infinite;}
@keyframes br{0%,100%{opacity:.6;}50%{opacity:1;}}
.ebox{width:64px;height:64px;border-radius:16px;border:2px dashed var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--border2);font-family:'JetBrains Mono',monospace;}
.etxt{font-size:14px;text-align:center;line-height:1.6;}
.etxt strong{color:var(--nc);font-weight:600;}
.msg{border-radius:var(--rs);padding:12px 16px;font-size:13px;line-height:1.6;max-width:75%;box-shadow:var(--shadow-sm);animation:mp .28s;}
@keyframes mp{from{opacity:0;transform:scale(0.95) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mrole{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.msg.customer{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:2px;color:var(--text);}
.msg.customer .mrole{color:var(--muted);}
.msg.agent{background:#e0e7ff;border:1px solid #c7d2fe;align-self:flex-end;border-bottom-right-radius:2px;color:#1e3a8a;}
.msg.agent .mrole{color:#3730a3;}
.msg.system{background:#f3f4f6;border:1px solid #e5e7eb;align-self:center;max-width:90%;font-size:12px;color:#4b5563;font-family:'JetBrains Mono',monospace;text-align:center;}
.msg.system .mrole{color:#6b7280;}
.rb{display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;animation:pi .35s;}
@keyframes pi{from{transform:scale(0);}to{transform:scale(1);}}
.rb.pos{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;}
.rb.neg{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}
.rb.zro{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;}
.ap{border-top:1px solid var(--border);padding:16px 20px;background:var(--surface);flex-shrink:0;display:none;box-shadow:0 -4px 6px -1px rgba(0,0,0,0.02);z-index:5;}
.ap.show{display:block;}
.aplbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}
.ag{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.ab{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.ab:hover{border-color:var(--border2);background:var(--surface2);}
.ab.sel{border-color:var(--nc);color:var(--nc);background:#eef2ff;box-shadow:0 0 0 1px var(--nc);}
.pr{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;}
.pf{display:flex;flex-direction:column;gap:6px;flex:1;min-width:150px;}
.pfl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.pfi{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:all .2s;width:100%;box-shadow:inset 0 1px 2px rgba(0,0,0,0.02);}
.pfi:focus{border-color:var(--nc);box-shadow:0 0 0 3px rgba(79,70,229,0.15);}
textarea.pfi{min-height:50px;resize:vertical;font-family:'Inter',sans-serif;}
.stpbtn{padding:10px 24px;background:var(--text);color:#fff;border:none;border-radius:6px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:var(--shadow-sm);flex-shrink:0;}
.stpbtn:hover:not(:disabled){background:#000;box-shadow:var(--shadow);transform:translateY(-1px);}
.stpbtn:disabled{opacity:.5;cursor:not-allowed;}
.fab{display:none;position:fixed;bottom:20px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--nc);border:none;cursor:pointer;box-shadow:var(--shadow-lg);color:#fff;font-size:20px;align-items:center;justify-content:center;transition:transform .2s;}
@media(max-width:720px){.fab{display:flex;}}
.fab:active{transform:scale(.95);}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-left:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="ov" id="ov" onclick="closeSB()"></div>
<div class="app">
  <header>
    <div class="logo">OE</div>
    <div class="htitle">Customer Support Resolution</div>
    <div class="htag">OpenEnv v1.0</div>
    <div class="hsub">Meta x Hugging Face · RL Environment</div>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sb">
      <div class="sb-scroll">
        <div class="slbl">Tasks</div>
        <div id="tl"></div>
      </div>
      <div class="sp" id="sp"></div>
      <div class="ctrl">
        <div class="sr">
          <span class="sl2">SEED</span>
          <input type="number" class="si" id="si" value="42" min="0" max="9999">
        </div>
        <button class="btn btn-p" id="rb" onclick="doReset()">Start Episode</button>
        <button class="btn btn-g" id="gb" onclick="doGrade()" disabled>Grade Episode</button>
        <button class="btn btn-g" onclick="doBaseline()">Run Baseline</button>
      </div>
    </aside>
    <main class="main">
      <div class="ob" id="ob">
        <div class="ocs" id="ocs"></div>
        <div class="ost" id="ost"></div>
        <div class="pg"><div class="pgf" id="pgf" style="width:0%"></div></div>
      </div>
      <div class="cv" id="cv">
        <div class="empty">
          <div class="ebox">[ ]</div>
          <div class="etxt">Select a task and hit<br><strong>Start Episode</strong> to begin</div>
        </div>
      </div>
      <div class="ap" id="ap">
        <div class="aplbl">Take an Action</div>
        <div class="ag" id="ag"></div>
        <div class="pr" id="pr"></div>
      </div>
    </main>
  </div>
</div>
<button class="fab" onclick="toggleSB()">&#9776;</button>
<script>
const BASE=window.location.origin;
const TASKS=[];
let AT=null,EA=false,SA=null,TR=0;
const AL={ask_clarification:'Ask Clarification',lookup_account:'Lookup Account',check_system_status:'Check Status',apply_fix:'Apply Fix',issue_refund:'Issue Refund',reset_credentials:'Reset Credentials',escalate:'Escalate',send_response:'Send Response',close_ticket:'Close Ticket'};
const PL={ask_clarification:[{k:'question',l:'Question',t:'ta',p:'e.g. Can you describe the error?'}],lookup_account:[{k:'account_id',l:'Account ID',t:'tx',p:'e.g. ACC-7842'}],apply_fix:[{k:'fix_type',l:'Fix Type',t:'tx',p:'reset_auth_config'},{k:'component',l:'Component',t:'tx',p:'auth'}],escalate:[{k:'tier',l:'Tier',t:'tx',p:'2'},{k:'reason',l:'Reason',t:'tx',p:'Infrastructure outage'}],send_response:[{k:'message',l:'Message',t:'ta',p:'Write your response...'}],close_ticket:[{k:'resolution',l:'Resolution Notes',t:'ta',p:'Describe what was done...'}],issue_refund:[{k:'amount',l:'Amount ($)',t:'tx',p:'49.99'},{k:'reason',l:'Reason',t:'tx',p:'duplicate_charge'}],reset_credentials:[{k:'method',l:'Method',t:'tx',p:'email'},{k:'notify_customer',l:'Notify (true/false)',t:'tx',p:'true'}],check_system_status:[{k:'service',l:'Service',t:'tx',p:'api_gateway'},{k:'region',l:'Region',t:'tx',p:'all'}]};

async function init(){
  try{
    const d=await(await fetch(BASE+'/tasks')).json();
    const list=document.getElementById('tl');
    d.tasks.forEach((t,i)=>{
      TASKS.push(t);
      const el=document.createElement('div');
      el.className='tc '+t.difficulty+(i===0?' active':'');
      el.id='tc-'+t.id;el.onclick=()=>selT(t.id);
      el.innerHTML='<div class="tn">'+t.name+'</div><div class="td">'+t.description.substring(0,88)+'...</div><div class="tps"><span class="pill '+t.difficulty+'">'+t.difficulty+'</span><span class="pill m">max '+t.max_steps+' steps</span><span class="pill m">pass >='+t.reward_threshold+'</span></div>';
      list.appendChild(el);
    });
    if(TASKS.length)selT(TASKS[0].id);
  }catch(e){showErr('Cannot reach API: '+e.message);}
}

function selT(id){AT=id;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));document.getElementById('tc-'+id)?.classList.add('active');}
function toggleSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('open');}
function closeSB(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('open');}

async function doReset(){
  if(!AT)return;
  const seed=parseInt(document.getElementById('si').value)||42;
  const btn=document.getElementById('rb');btn.disabled=true;btn.innerHTML='Starting <span class="spin"></span>';
  try{
    const r=await fetch(BASE+'/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:AT,seed})});
    const d=await r.json();if(!r.ok)throw new Error(d.detail||'Reset failed');
    EA=true;TR=0;document.getElementById('gb').disabled=false;
    const sp=document.getElementById('sp');sp.classList.remove('show');sp.style.display='none';
    renderObs(d.observation);renderConvo(d.observation.conversation_history,null);renderAP();closeSB();
  }catch(e){showErr(e.message);}
  finally{btn.disabled=false;btn.textContent='Start Episode';}
}

async function doStep(){
  if(!EA||!SA)return;
  const payload={};
  (PL[SA]||[]).forEach(f=>{const el=document.getElementById('pf-'+f.k);if(el?.value.trim()){let v=el.value.trim();if(v==='true')v=true;else if(v==='false')v=false;else if(!isNaN(v)&&v!=='')v=parseFloat(v);payload[f.k]=v;}});
  const btn=document.getElementById('stpbtn');if(btn){btn.disabled=true;btn.innerHTML='Sending <span class="spin"></span>';}
  try{
    const r=await fetch(BASE+'/step',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action_type:SA,payload})});
    const d=await r.json();if(!r.ok)throw new Error(d.detail||'Step failed');
    TR+=d.reward;renderObs(d.observation);renderConvo(d.observation.conversation_history,d.reward);
    if(d.done){EA=false;document.getElementById('ap').classList.remove('show');await doGrade();}
  }catch(e){showErr(e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='Step';}}
}

async function doGrade(){
  try{
    const st=await(await fetch(BASE+'/state')).json();
    const r=await fetch(BASE+'/grader',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:AT,episode_log:st.episode_log})});
    renderScore(await r.json());
  }catch(e){showErr(e.message);}
}

async function doBaseline(){
  const btn=event.target;btn.disabled=true;btn.innerHTML='Running <span class="spin"></span>';
  try{
    const d=await(await fetch(BASE+'/baseline')).json();
    const sp=document.getElementById('sp');sp.style.display='block';sp.classList.add('show');
    sp.innerHTML='<div class="slbl" style="margin-bottom:9px">Baseline — All Tasks</div>'+
      Object.entries(d.scores).map(([id,s])=>{const t=TASKS.find(x=>x.id===id);const p=s>=(t?.reward_threshold||0.5);return'<div class="bkr"><span class="bkk">'+id.replace(/_/g,' ')+'</span><span class="bkv '+(p?'pos':'neg')+'">'+s.toFixed(4)+'</span></div>';}).join('')+
      '<div class="bkr" style="margin-top:5px"><span class="bkk" style="color:var(--text);font-weight:700">Mean</span><span class="bkv pos">'+d.mean_score.toFixed(4)+'</span></div>';
  }catch(e){showErr(e.message);}
  finally{btn.disabled=false;btn.textContent='Run Baseline';}
}

function renderObs(obs){
  document.getElementById('ob').classList.add('show');
  document.getElementById('ocs').innerHTML=[['Ticket',obs.ticket_id],['Category',obs.issue_category],['Tier',obs.customer_tier],['Priority',obs.priority]].map(([l,v])=>'<div class="oc"><div class="ocl">'+l+'</div><div class="ocv">'+v+'</div></div>').join('');
  const rc=TR<0?'neg':'';
  document.getElementById('ost').innerHTML='<span>Step <span class="sv">'+obs.current_step+'</span>/'+obs.max_steps+'</span><span>Resolved: <span class="sv" style="color:'+(obs.resolved?'var(--ng)':'var(--muted)')+'">'+obs.resolved+'</span></span><span>SLA: <span class="sv" style="color:'+(obs.sla_breached?'var(--np)':'var(--muted)')+'">'+obs.sla_breached+'</span></span><span>Reward: <span class="rv '+rc+'">'+(TR>=0?'+':'')+TR.toFixed(3)+'</span></span>';
  document.getElementById('pgf').style.width=(obs.current_step/obs.max_steps*100).toFixed(1)+'%';
}

function renderConvo(history,lastReward){
  const c=document.getElementById('cv');c.innerHTML='';
  history.forEach((msg,i)=>{
    const isL=i===history.length-1;const div=document.createElement('div');div.className='msg '+msg.role;
    let badge='';
    if(isL&&lastReward!==null){const cls=lastReward>0?'pos':lastReward<0?'neg':'zro';badge='<span class="rb '+cls+'">'+(lastReward>0?'+':'')+lastReward.toFixed(3)+'</span>';}
    div.innerHTML='<div class="mrole">'+msg.role+badge+'</div>'+esc(msg.content);
    c.appendChild(div);
  });
  c.scrollTop=c.scrollHeight;
}

function renderAP(){
  const ap=document.getElementById('ap');ap.classList.add('show');
  document.getElementById('ag').innerHTML=Object.keys(AL).map(a=>'<button class="ab" id="ab-'+a+'" onclick="selA(\''+a+'\')">'+AL[a]+'</button>').join('')+'<button class="stpbtn" id="stpbtn" onclick="doStep()" style="margin-left:auto" disabled>Step</button>';
  document.getElementById('pr').innerHTML='';SA=null;
}

function selA(a){
  SA=a;document.querySelectorAll('.ab').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ab-'+a)?.classList.add('sel');document.getElementById('stpbtn').disabled=false;
  document.getElementById('pr').innerHTML=(PL[a]||[]).map(f=>'<div class="pf"><span class="pfl">'+f.l+'</span>'+(f.t==='ta'?'<textarea class="pfi" id="pf-'+f.k+'" placeholder="'+f.p+'" rows="2"></textarea>':'<input class="pfi" type="text" id="pf-'+f.k+'" placeholder="'+f.p+'">')+'</div>').join('');
}

function renderScore(data){
  const sp=document.getElementById('sp');sp.style.display='block';sp.classList.add('show');
  const t=TASKS.find(x=>x.id===data.task_id);
  sp.innerHTML='<div class="snum '+(data.passed?'pass':'fail')+'">'+data.score.toFixed(4)+'</div><div class="ssub">threshold '+(t?.reward_threshold??'--')+' · '+(data.passed?'PASS':'FAIL')+'</div><div class="sfb">'+data.feedback+'</div><div class="slbl" style="margin-bottom:6px">Breakdown</div>'+Object.entries(data.breakdown).map(([k,v])=>'<div class="bkr"><span class="bkk">'+k.replace(/_/g,' ')+'</span><span class="bkv '+(v>0?'pos':v<0?'neg':'')+'">'+( v>=0?'+':'')+v.toFixed(2)+'</span></div>').join('');
}

function showErr(msg){const c=document.getElementById('cv');const d=document.createElement('div');d.style.cssText='background:rgba(255,45,120,0.07);border:1px solid rgba(255,45,120,0.25);border-radius:10px;padding:9px 13px;font-size:11px;color:var(--np);font-family:JetBrains Mono,monospace;align-self:stretch;';d.textContent='ERROR: '+msg;c.appendChild(d);c.scrollTop=c.scrollHeight;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
