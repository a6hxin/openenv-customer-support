<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OpenEnv · Customer Support Resolution</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040a;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--nc:#00f5ff;--np:#ff2d78;--npu:#b44dff;--ng:#00ff88;--ny:#ffe500;--text:#f0f0ff;--muted:rgba(240,240,255,0.4);--r:18px;--rs:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;height:100dvh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:44px 44px;animation:gd 25s linear infinite;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 35% at 5% 0%,rgba(0,245,255,0.09) 0%,transparent 65%),radial-gradient(ellipse 45% 35% at 95% 100%,rgba(255,45,120,0.09) 0%,transparent 65%);pointer-events:none;z-index:0;}
@keyframes gd{to{background-position:0 44px;}}
.sl{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;opacity:0.45;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh;}
header{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);background:rgba(4,4,10,0.85);backdrop-filter:blur(24px);flex-shrink:0;animation:hi .5s ease;}
@keyframes hi{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--nc),var(--npu));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#000;box-shadow:0 0 16px rgba(0,245,255,0.4);flex-shrink:0;}
.htitle{font-size:15px;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(90deg,var(--nc) 0%,#fff 50%,var(--npu) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.htag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--nc);border:1px solid rgba(0,245,255,0.25);padding:3px 8px;border-radius:20px;background:rgba(0,245,255,0.05);letter-spacing:0.06em;}
.hsub{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
@media(max-width:600px){.hsub{display:none;}}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);background:rgba(4,4,10,0.65);backdrop-filter:blur(24px);display:flex;flex-direction:column;overflow:hidden;transition:transform .35s cubic-bezier(.4,0,.2,1);}
@media(max-width:720px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);width:82vw;padding-top:56px;}.sidebar.open{transform:translateX(0);box-shadow:0 0 60px rgba(0,245,255,0.1);}}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:99;backdrop-filter:blur(4px);}
.ov.open{display:block;}
.sb-scroll{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:rgba(0,245,255,0.15) transparent;}
.slbl{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:10px;padding-left:2px;}
.tc{border:1px solid var(--border);border-radius:var(--rs);padding:13px;margin-bottom:8px;cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);background:var(--surface);position:relative;overflow:hidden;}
.tc::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .22s;border-radius:inherit;}
.tc.easy::before{background:linear-gradient(135deg,rgba(0,255,136,0.07),transparent 70%);}
.tc.medium::before{background:linear-gradient(135deg,rgba(255,229,0,0.07),transparent 70%);}
.tc.hard::before{background:linear-gradient(135deg,rgba(255,45,120,0.07),transparent 70%);}
.tc:hover::before,.tc.active::before{opacity:1;}
.tc:hover,.tc.active{transform:translateX(4px);}
.tc.active.easy{border-color:rgba(0,255,136,0.45);box-shadow:0 0 18px rgba(0,255,136,0.08);}
.tc.active.medium{border-color:rgba(255,229,0,0.45);box-shadow:0 0 18px rgba(255,229,0,0.08);}
.tc.active.hard{border-color:rgba(255,45,120,0.45);box-shadow:0 0 18px rgba(255,45,120,0.08);}
.tn{font-size:12px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em;}
.td{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:9px;}
.tps{display:flex;gap:5px;flex-wrap:wrap;}
.pill{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid currentColor;letter-spacing:0.03em;}
.pill.easy{color:var(--ng);background:rgba(0,255,136,0.07);}
.pill.medium{color:var(--ny);background:rgba(255,229,0,0.07);}
.pill.hard{color:var(--np);background:rgba(255,45,120,0.07);}
.pill.m{color:var(--muted);border-color:var(--border2);}
.sp{margin:0 14px 14px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);display:none;animation:fu .3s ease;}
.sp.show{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.snum{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:600;letter-spacing:-0.04em;line-height:1;}
.snum.pass{color:var(--ng);text-shadow:0 0 20px rgba(0,255,136,0.5);}
.snum.fail{color:var(--np);text-shadow:0 0 20px rgba(255,45,120,0.5);}
.ssub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}
.sfb{font-size:11px;color:var(--muted);line-height:1.55;margin:10px 0 12px;padding:9px 12px;background:rgba(0,245,255,0.04);border-radius:8px;border-left:2px solid var(--nc);}
.bkr{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid var(--border);}
.bkr:last-child{border-bottom:none;}
.bkk{color:var(--muted);font-family:'JetBrains Mono',monospace;}
.bkv{font-family:'JetBrains Mono',monospace;font-weight:600;}
.bkv.pos{color:var(--ng);}
.bkv.neg{color:var(--np);}
.ctrl{padding:12px 14px;border-top:1px solid var(--border);background:rgba(4,4,10,0.88);display:flex;flex-direction:column;gap:7px;}
.sr{display:flex;align-items:center;gap:10px;}
.sl2{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;}
.si{background:var(--surface2);border:1px solid var(--border2);color:var(--nc);padding:6px 10px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;width:76px;outline:none;transition:border-color .2s,box-shadow .2s;}
.si:focus{border-color:rgba(0,245,255,0.4);box-shadow:0 0 0 3px rgba(0,245,255,0.07);}
.btn{width:100%;padding:10px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p{background:linear-gradient(135deg,var(--nc),var(--npu));color:#000;font-weight:800;box-shadow:0 4px 20px rgba(0,245,255,0.2);}
.btn-p:hover:not(:disabled){box-shadow:0 4px 28px rgba(0,245,255,0.38);transform:translateY(-1px);}
.btn-g{background:var(--surface);color:rgba(240,240,255,0.7);border:1px solid var(--border2);}
.btn-g:hover:not(:disabled){border-color:rgba(0,245,255,0.28);color:var(--nc);background:rgba(0,245,255,0.04);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.ob{padding:11px 16px;border-bottom:1px solid var(--border);background:rgba(4,4,10,0.75);backdrop-filter:blur(20px);flex-shrink:0;display:none;}
.ob.show{display:block;animation:fd .3s ease;}
@keyframes fd{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.ocs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;}
.oc{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;}
.ocl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;}
.ocv{font-size:11px;font-weight:700;margin-top:1px;}
.ost{display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.sv{color:var(--text);font-weight:600;}
.rv{color:var(--nc);font-weight:700;}
.rv.neg{color:var(--np);}
.pg{height:2px;background:var(--border);border-radius:2px;margin-top:9px;overflow:hidden;}
.pgf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--nc),var(--npu));transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(0,245,255,0.5);}
.cv{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;scrollbar-width:thin;scrollbar-color:rgba(0,245,255,0.12) transparent;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;animation:br 3s ease-in-out infinite;}
@keyframes br{0%,100%{opacity:.45;}50%{opacity:.9;}}
.ebox{width:52px;height:52px;border-radius:14px;border:1px solid rgba(0,245,255,0.18);background:rgba(0,245,255,0.04);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--nc);}
.etxt{font-size:12px;color:var(--muted);text-align:center;line-height:1.65;}
.etxt strong{color:var(--nc);}
.msg{border-radius:var(--rs);padding:10px 13px;font-size:12px;line-height:1.6;max-width:80%;animation:mp .28s cubic-bezier(.34,1.4,.64,1);}
@keyframes mp{from{opacity:0;transform:scale(0.9) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mrole{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:4px;opacity:.55;}
.msg.customer{background:var(--surface2);border:1px solid var(--border2);align-self:flex-start;border-bottom-left-radius:4px;}
.msg.agent{background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.18);align-self:flex-end;border-bottom-right-radius:4px;}
.msg.agent .mrole{color:var(--nc);opacity:1;}
.msg.system{background:rgba(180,77,255,0.06);border:1px solid rgba(180,77,255,0.18);align-self:center;max-width:92%;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(240,240,255,0.6);}
.msg.system .mrole{color:var(--npu);opacity:1;}
.rb{display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:7px;vertical-align:middle;animation:pi .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pi{from{transform:scale(0);}to{transform:scale(1);}}
.rb.pos{background:rgba(0,255,136,0.12);color:var(--ng);border:1px solid rgba(0,255,136,0.25);}
.rb.neg{background:rgba(255,45,120,0.12);color:var(--np);border:1px solid rgba(255,45,120,0.25);}
.rb.zro{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.ap{border-top:1px solid var(--border);padding:13px 16px;background:rgba(4,4,10,0.88);backdrop-filter:blur(20px);flex-shrink:0;display:none;}
.ap.show{display:block;}
.aplbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:9px;}
.ag{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.ab{padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .16s cubic-bezier(.4,0,.2,1);}
.ab:hover{border-color:rgba(0,245,255,0.28);color:var(--nc);transform:translateY(-1px);}
.ab.sel{border-color:var(--nc);color:var(--nc);background:rgba(0,245,255,0.07);box-shadow:0 0 10px rgba(0,245,255,0.12);}
.pr{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;margin-bottom:9px;}
.pf{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px;}
.pfl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.pfi{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
.pfi:focus{border-color:rgba(0,245,255,0.4);box-shadow:0 0 0 3px rgba(0,245,255,0.07);}
textarea.pfi{min-height:50px;resize:vertical;font-family:'Syne',sans-serif;font-size:11px;}
.stpbtn{padding:9px 22px;background:linear-gradient(135deg,var(--nc),var(--npu));color:#000;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;box-shadow:0 4px 16px rgba(0,245,255,0.18);flex-shrink:0;}
.stpbtn:hover:not(:disabled){box-shadow:0 4px 28px rgba(0,245,255,0.36);transform:translateY(-1px) scale(1.02);}
.stpbtn:disabled{opacity:.35;cursor:not-allowed;}
.fab{display:none;position:fixed;bottom:22px;right:18px;z-index:200;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--nc),var(--npu));border:none;cursor:pointer;box-shadow:0 0 20px rgba(0,245,255,0.35);transition:transform .2s;color:#000;font-size:19px;font-weight:800;align-items:center;justify-content:center;}
@media(max-width:720px){.fab{display:flex;}}
.fab:active{transform:scale(.92);}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(0,0,0,0.25);border-top-color:#000;border-radius:50%;animation:sp .55s linear infinite;vertical-align:middle;margin-left:5px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="sl"></div>
<div class="ov" id="ov" onclick="closeSB()"></div>
<div class="app">
  <header>
    <div class="logo">OE</div>
    <div class="htitle">Customer Support Resolution</div>
    <div class="htag">OpenEnv v1.0</div>
    <div class="hsub">Meta x Hugging Face · RL Environment</div>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sb">
      <div class="sb-scroll">
        <div class="slbl">Tasks</div>
        <div id="tl"></div>
      </div>
      <div class="sp" id="sp"></div>
      <div class="ctrl">
        <div class="sr">
          <span class="sl2">SEED</span>
          <input type="number" class="si" id="si" value="42" min="0" max="9999">
        </div>
        <button class="btn btn-p" id="rb" onclick="doReset()">Start Episode</button>
        <button class="btn btn-g" id="gb" onclick="doGrade()" disabled>Grade Episode</button>
        <button class="btn btn-g" onclick="doBaseline()">Run Baseline</button>
      </div>
    </aside>
    <main class="main">
      <div class="ob" id="ob">
        <div class="ocs" id="ocs"></div>
        <div class="ost" id="ost"></div>
        <div class="pg"><div class="pgf" id="pgf" style="width:0%"></div></div>
      </div>
      <div class="cv" id="cv">
        <div class="empty">
          <div class="ebox">[ ]</div>
          <div class="etxt">Select a task and hit<br><strong>Start Episode</strong> to begin</div>
        </div>
      </div>
      <div class="ap" id="ap">
        <div class="aplbl">Take an Action</div>
        <div class="ag" id="ag"></div>
        <div class="pr" id="pr"></div>
      </div>
    </main>
  </div>
</div>
<button class="fab" onclick="toggleSB()">&#9776;</button>
<script>
const BASE=window.location.origin;
const TASKS=[];
let AT=null,EA=false,SA=null,TR=0;
const AL={ask_clarification:'Ask Clarification',lookup_account:'Lookup Account',check_system_status:'Check Status',apply_fix:'Apply Fix',issue_refund:'Issue Refund',reset_credentials:'Reset Credentials',escalate:'Escalate',send_response:'Send Response',close_ticket:'Close Ticket'};
const PL={ask_clarification:[{k:'question',l:'Question',t:'ta',p:'e.g. Can you describe the error?'}],lookup_account:[{k:'account_id',l:'Account ID',t:'tx',p:'e.g. ACC-7842'}],apply_fix:[{k:'fix_type',l:'Fix Type',t:'tx',p:'reset_auth_config'},{k:'component',l:'Component',t:'tx',p:'auth'}],escalate:[{k:'tier',l:'Tier',t:'tx',p:'2'},{k:'reason',l:'Reason',t:'tx',p:'Infrastructure outage'}],send_response:[{k:'message',l:'Message',t:'ta',p:'Write your response...'}],close_ticket:[{k:'resolution',l:'Resolution Notes',t:'ta',p:'Describe what was done...'}],issue_refund:[{k:'amount',l:'Amount ($)',t:'tx',p:'49.99'},{k:'reason',l:'Reason',t:'tx',p:'duplicate_charge'}],reset_credentials:[{k:'method',l:'Method',t:'tx',p:'email'},{k:'notify_customer',l:'Notify (true/false)',t:'tx',p:'true'}],check_system_status:[{k:'service',l:'Service',t:'tx',p:'api_gateway'},{k:'region',l:'Region',t:'tx',p:'all'}]};

async function init(){
  try{
    const d=await(await fetch(BASE+'/tasks')).json();
    const list=document.getElementById('tl');
    d.tasks.forEach((t,i)=>{
      TASKS.push(t);
      const el=document.createElement('div');
      el.className='tc '+t.difficulty+(i===0?' active':'');
      el.id='tc-'+t.id;el.onclick=()=>selT(t.id);
      el.innerHTML='<div class="tn">'+t.name+'</div><div class="td">'+t.description.substring(0,88)+'...</div><div class="tps"><span class="pill '+t.difficulty+'">'+t.difficulty+'</span><span class="pill m">max '+t.max_steps+' steps</span><span class="pill m">pass >='+t.reward_threshold+'</span></div>';
      list.appendChild(el);
    });
    if(TASKS.length)selT(TASKS[0].id);
  }catch(e){showErr('Cannot reach API: '+e.message);}
}

function selT(id){AT=id;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));document.getElementById('tc-'+id)?.classList.add('active');}
function toggleSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('open');}
function closeSB(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('open');}

async function doReset(){
  if(!AT)return;
  const seed=parseInt(document.getElementById('si').value)||42;
  const btn=document.getElementById('rb');btn.disabled=true;btn.innerHTML='Starting <span class="spin"></span>';
  try{
    const r=await fetch(BASE+'/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:AT,seed})});
    const d=await r.json();if(!r.ok)throw new Error(d.detail||'Reset failed');
    EA=true;TR=0;document.getElementById('gb').disabled=false;
    const sp=document.getElementById('sp');sp.classList.remove('show');sp.style.display='none';
    renderObs(d.observation);renderConvo(d.observation.conversation_history,null);renderAP();closeSB();
  }catch(e){showErr(e.message);}
  finally{btn.disabled=false;btn.textContent='Start Episode';}
}

async function doStep(){
  if(!EA||!SA)return;
  const payload={};
  (PL[SA]||[]).forEach(f=>{const el=document.getElementById('pf-'+f.k);if(el?.value.trim()){let v=el.value.trim();if(v==='true')v=true;else if(v==='false')v=false;else if(!isNaN(v)&&v!=='')v=parseFloat(v);payload[f.k]=v;}});
  const btn=document.getElementById('stpbtn');if(btn){btn.disabled=true;btn.innerHTML='Sending <span class="spin"></span>';}
  try{
    const r=await fetch(BASE+'/step',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action_type:SA,payload})});
    const d=await r.json();if(!r.ok)throw new Error(d.detail||'Step failed');
    TR+=d.reward;renderObs(d.observation);renderConvo(d.observation.conversation_history,d.reward);
    if(d.done){EA=false;document.getElementById('ap').classList.remove('show');await doGrade();}
  }catch(e){showErr(e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='Step';}}
}

async function doGrade(){
  try{
    const st=await(await fetch(BASE+'/state')).json();
    const r=await fetch(BASE+'/grader',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:AT,episode_log:st.episode_log})});
    renderScore(await r.json());
  }catch(e){showErr(e.message);}
}

async function doBaseline(){
  const btn=event.target;btn.disabled=true;btn.innerHTML='Running <span class="spin"></span>';
  try{
    const d=await(await fetch(BASE+'/baseline')).json();
    const sp=document.getElementById('sp');sp.style.display='block';sp.classList.add('show');
    sp.innerHTML='<div class="slbl" style="margin-bottom:9px">Baseline — All Tasks</div>'+
      Object.entries(d.scores).map(([id,s])=>{const t=TASKS.find(x=>x.id===id);const p=s>=(t?.reward_threshold||0.5);return'<div class="bkr"><span class="bkk">'+id.replace(/_/g,' ')+'</span><span class="bkv '+(p?'pos':'neg')+'">'+s.toFixed(4)+'</span></div>';}).join('')+
      '<div class="bkr" style="margin-top:5px"><span class="bkk" style="color:var(--text);font-weight:700">Mean</span><span class="bkv pos">'+d.mean_score.toFixed(4)+'</span></div>';
  }catch(e){showErr(e.message);}
  finally{btn.disabled=false;btn.textContent='Run Baseline';}
}

function renderObs(obs){
  document.getElementById('ob').classList.add('show');
  document.getElementById('ocs').innerHTML=[['Ticket',obs.ticket_id],['Category',obs.issue_category],['Tier',obs.customer_tier],['Priority',obs.priority]].map(([l,v])=>'<div class="oc"><div class="ocl">'+l+'</div><div class="ocv">'+v+'</div></div>').join('');
  const rc=TR<0?'neg':'';
  document.getElementById('ost').innerHTML='<span>Step <span class="sv">'+obs.current_step+'</span>/'+obs.max_steps+'</span><span>Resolved: <span class="sv" style="color:'+(obs.resolved?'var(--ng)':'var(--muted)')+'">'+obs.resolved+'</span></span><span>SLA: <span class="sv" style="color:'+(obs.sla_breached?'var(--np)':'var(--muted)')+'">'+obs.sla_breached+'</span></span><span>Reward: <span class="rv '+rc+'">'+(TR>=0?'+':'')+TR.toFixed(3)+'</span></span>';
  document.getElementById('pgf').style.width=(obs.current_step/obs.max_steps*100).toFixed(1)+'%';
}

function renderConvo(history,lastReward){
  const c=document.getElementById('cv');c.innerHTML='';
  history.forEach((msg,i)=>{
    const isL=i===history.length-1;const div=document.createElement('div');div.className='msg '+msg.role;
    let badge='';
    if(isL&&lastReward!==null){const cls=lastReward>0?'pos':lastReward<0?'neg':'zro';badge='<span class="rb '+cls+'">'+(lastReward>0?'+':'')+lastReward.toFixed(3)+'</span>';}
    div.innerHTML='<div class="mrole">'+msg.role+badge+'</div>'+esc(msg.content);
    c.appendChild(div);
  });
  c.scrollTop=c.scrollHeight;
}

function renderAP(){
  const ap=document.getElementById('ap');ap.classList.add('show');
  document.getElementById('ag').innerHTML=Object.keys(AL).map(a=>'<button class="ab" id="ab-'+a+'" onclick="selA(\''+a+'\')">'+AL[a]+'</button>').join('')+'<button class="stpbtn" id="stpbtn" onclick="doStep()" style="margin-left:auto" disabled>Step</button>';
  document.getElementById('pr').innerHTML='';SA=null;
}

function selA(a){
  SA=a;document.querySelectorAll('.ab').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ab-'+a)?.classList.add('sel');document.getElementById('stpbtn').disabled=false;
  document.getElementById('pr').innerHTML=(PL[a]||[]).map(f=>'<div class="pf"><span class="pfl">'+f.l+'</span>'+(f.t==='ta'?'<textarea class="pfi" id="pf-'+f.k+'" placeholder="'+f.p+'" rows="2"></textarea>':'<input class="pfi" type="text" id="pf-'+f.k+'" placeholder="'+f.p+'">')+'</div>').join('');
}

function renderScore(data){
  const sp=document.getElementById('sp');sp.style.display='block';sp.classList.add('show');
  const t=TASKS.find(x=>x.id===data.task_id);
  sp.innerHTML='<div class="snum '+(data.passed?'pass':'fail')+'">'+data.score.toFixed(4)+'</div><div class="ssub">threshold '+(t?.reward_threshold??'--')+' · '+(data.passed?'PASS':'FAIL')+'</div><div class="sfb">'+data.feedback+'</div><div class="slbl" style="margin-bottom:6px">Breakdown</div>'+Object.entries(data.breakdown).map(([k,v])=>'<div class="bkr"><span class="bkk">'+k.replace(/_/g,' ')+'</span><span class="bkv '+(v>0?'pos':v<0?'neg':'')+'">'+( v>=0?'+':'')+v.toFixed(2)+'</span></div>').join('');
}

function showErr(msg){const c=document.getElementById('cv');const d=document.createElement('div');d.style.cssText='background:rgba(255,45,120,0.07);border:1px solid rgba(255,45,120,0.25);border-radius:10px;padding:9px 13px;font-size:11px;color:var(--np);font-family:JetBrains Mono,monospace;align-self:stretch;';d.textContent='ERROR: '+msg;c.appendChild(d);c.scrollTop=c.scrollHeight;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
